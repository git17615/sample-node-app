version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout

      - run:
          name: Install Dependencies
          command: npm install

      - run:
          name: Run Tests
          command: npm test

      - run:
          name: Build Docker Image
          command: docker build -t sample-node-app .

workflows:
  version: 2
  build_pipeline:
    jobs:
      - build
